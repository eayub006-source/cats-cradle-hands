<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cat's Cradle</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050913;
      --panel: rgba(8, 14, 28, 0.72);
      --text: rgba(235, 246, 255, 0.88);
      --muted: rgba(197, 214, 235, 0.7);
      --cyan: #58f7ff;
      --magenta: #ff4fd8;
      --yellow: #ffe15c;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(65, 120, 255, 0.12), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(255, 79, 216, 0.1), transparent 26%),
        linear-gradient(180deg, #050913 0%, #02050b 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #050913;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      left: 20px;
      top: 18px;
      z-index: 2;
      padding: 12px 14px;
      border: 1px solid rgba(120, 190, 255, 0.18);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(8, 14, 28, 0.78), rgba(6, 9, 18, 0.55));
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.08), inset 0 0 16px rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      max-width: min(360px, calc(100vw - 40px));
      pointer-events: none;
    }

    #title {
      font-size: 15px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      margin: 0 0 4px;
      font-weight: 700;
    }

    #status {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      margin: 0;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      opacity: 0.12;
      background-image: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.05) 0,
        rgba(255, 255, 255, 0.02) 1px,
        transparent 2px,
        transparent 4px
      );
      background-size: 100% 4px;
      mix-blend-mode: screen;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: radial-gradient(circle at center, transparent 38%, rgba(0, 0, 0, 0.42) 100%);
    }

    .reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120px;
      height: 120px;
      margin-left: -60px;
      margin-top: -60px;
      border: 1px solid rgba(88, 247, 255, 0.08);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(88, 247, 255, 0.05), inset 0 0 20px rgba(255, 255, 255, 0.03);
      pointer-events: none;
      z-index: 3;
      opacity: 0.75;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: rgba(88, 247, 255, 0.08);
      transform: translate(-50%, -50%);
    }

    .reticle::before {
      width: 80px;
      height: 1px;
    }

    .reticle::after {
      width: 1px;
      height: 80px;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" playsinline muted></video>
    <div id="overlay"></div>
    <div id="hud">
      <h1 id="title">Cat's Cradle</h1>
      <p id="status">Awaiting camera permission and hand tracking.</p>
    </div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="reticle"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const videoEl = document.getElementById('video');
    const appEl = document.getElementById('app');

    const GLOW_COLORS = ['#58f7ff', '#ff4fd8', '#ffe15c'];
    const FINGERTIP_IDS = [4, 8, 12, 16, 20];
    const JOINT_IDS = [0, 2, 4, 5, 6, 8, 9, 10, 12, 13, 14, 16, 17, 18, 20];
    const STRING_PAIRS = [
      [4, 4],
      [8, 8],
      [12, 12],
      [16, 16],
      [20, 20]
    ];

    const state = {
      width: window.innerWidth,
      height: window.innerHeight,
      hands: {
        left: null,
        right: null
      },
      smoothed: {
        left: null,
        right: null
      },
      particles: [],
      strings: [],
      videoReady: false,
      hasHands: false,
      cameraError: ''
    };

    function updateStatus(message) {
      statusEl.textContent = message;
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.hypot(dx, dy);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerpPoint(a, b, amount) {
      return {
        x: a.x + (b.x - a.x) * amount,
        y: a.y + (b.y - a.y) * amount,
        z: (a.z || 0) + ((b.z || 0) - (a.z || 0)) * amount,
        v: a.v !== undefined ? a.v + ((b.v ?? a.v) - a.v) * amount : b.v
      };
    }

    function buildLandmarkSet(landmarks, handednessLabel) {
      const points = landmarks.map((point, index) => ({
        x: 1 - point.x,
        y: point.y,
        z: point.z,
        index,
        handedness: handednessLabel
      }));

      const center = points.reduce((acc, point) => {
        acc.x += point.x;
        acc.y += point.y;
        return acc;
      }, { x: 0, y: 0 });
      center.x /= points.length;
      center.y /= points.length;

      const handednessIsLeft = handednessLabel.toLowerCase().includes('left');
      const side = handednessIsLeft ? 'left' : 'right';

      return {
        side,
        points,
        center,
        confidence: 1
      };
    }

    function mixHands(results) {
      const hands = { left: null, right: null };

      if (results.multiHandLandmarks && results.multiHandLandmarks.length) {
        results.multiHandLandmarks.forEach((landmarks, index) => {
          const label = results.multiHandedness && results.multiHandedness[index]
            ? results.multiHandedness[index].label
            : (index === 0 ? 'Left' : 'Right');
          const hand = buildLandmarkSet(landmarks, label);
          hands[hand.side] = hand;
        });
      }

      return hands;
    }

    function smoothHands(nextHands) {
      ['left', 'right'].forEach((side) => {
        const next = nextHands[side];
        const prev = state.smoothed[side];

        if (!next) {
          state.smoothed[side] = null;
          return;
        }

        if (!prev) {
          state.smoothed[side] = {
            ...next,
            points: next.points.map(point => ({ ...point }))
          };
          return;
        }

        const points = next.points.map((point, index) => lerpPoint(prev.points[index], point, 0.42));
        state.smoothed[side] = {
          ...next,
          center: lerpPoint(prev.center, next.center, 0.25),
          points
        };
      });
    }

    function screenPoint(point) {
      return {
        x: point.x * state.width,
        y: point.y * state.height,
        z: point.z || 0
      };
    }

    function updateStrings() {
      state.strings.length = 0;
      const left = state.smoothed.left;
      const right = state.smoothed.right;
      if (!left || !right) return;

      const leftPalm = screenPoint(left.center);
      const rightPalm = screenPoint(right.center);
      const handSpan = clamp(distance(leftPalm, rightPalm) / Math.max(state.width, state.height), 0.05, 0.75);
      const tension = clamp(1 - handSpan, 0.1, 0.95);

      STRING_PAIRS.forEach(([leftIndex, rightIndex], idx) => {
        const a = screenPoint(left.points[leftIndex]);
        const b = screenPoint(right.points[rightIndex]);
        const chord = distance(a, b);
        const wobble = Math.sin((performance.now() * 0.0026) + idx * 1.2) * (8 + 20 * handSpan);
        state.strings.push({
          a,
          b,
          chord,
          tension,
          wobble,
          hueShift: idx / STRING_PAIRS.length
        });
      });
    }

    function spawnBurst(x, y, intensity, baseColor) {
      const count = Math.floor(10 + intensity * 26);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.35;
        const speed = 0.8 + Math.random() * (3.4 + intensity * 5.5);
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.012 + Math.random() * 0.018,
          size: 1.4 + Math.random() * 2.8,
          color: baseColor
        });
      }
    }

    function maybeTriggerContacts() {
      const left = state.smoothed.left;
      const right = state.smoothed.right;
      if (!left || !right) return;

      FINGERTIP_IDS.forEach((id) => {
        const leftTip = screenPoint(left.points[id]);
        const rightTip = screenPoint(right.points[id]);
        const d = distance(leftTip, rightTip);
        const threshold = Math.max(26, Math.min(state.width, state.height) * 0.06);
        if (d < threshold) {
          const mixX = (leftTip.x + rightTip.x) * 0.5;
          const mixY = (leftTip.y + rightTip.y) * 0.5;
          const intensity = 1 - d / threshold;
          spawnBurst(mixX, mixY, intensity, GLOW_COLORS[id % GLOW_COLORS.length]);
        }
      });
    }

    function drawBackground(p) {
      const ctx = p.drawingContext;
      const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
      gradient.addColorStop(0, '#09111f');
      gradient.addColorStop(0.5, '#050913');
      gradient.addColorStop(1, '#02040a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, state.width, state.height);

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = 'rgba(88, 247, 255, 0.08)';
      for (let i = 0; i < 14; i++) {
        const x = (Math.sin((p.frameCount * 0.004) + i * 1.7) * 0.25 + 0.5) * state.width;
        const y = (i / 13) * state.height;
        ctx.beginPath();
        ctx.arc(x, y, 1.5 + (i % 3) * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawVideo(p) {
      if (!state.videoReady || !videoEl.videoWidth) return;
      const ctx = p.drawingContext;
      const videoAspect = videoEl.videoWidth / videoEl.videoHeight;
      const canvasAspect = state.width / state.height;
      let drawWidth = state.width;
      let drawHeight = state.height;
      let offsetX = 0;
      let offsetY = 0;

      if (videoAspect > canvasAspect) {
        drawHeight = state.height;
        drawWidth = drawHeight * videoAspect;
        offsetX = (state.width - drawWidth) * 0.5;
      } else {
        drawWidth = state.width;
        drawHeight = drawWidth / videoAspect;
        offsetY = (state.height - drawHeight) * 0.5;
      }

      ctx.save();
      ctx.translate(state.width, 0);
      ctx.scale(-1, 1);
      ctx.globalAlpha = 0.18;
      ctx.drawImage(videoEl, -offsetX, offsetY, drawWidth, drawHeight);
      ctx.globalAlpha = 0.07;
      ctx.filter = 'blur(16px) contrast(130%) saturate(150%)';
      ctx.drawImage(videoEl, -offsetX, offsetY, drawWidth, drawHeight);
      ctx.restore();
      ctx.filter = 'none';
    }

    function drawJoints(p) {
      const ctx = p.drawingContext;
      [state.smoothed.left, state.smoothed.right].forEach((hand, handIndex) => {
        if (!hand) return;
        hand.points.forEach((point, index) => {
          const screen = screenPoint(point);
          const isTip = FINGERTIP_IDS.includes(index);
          const glowColor = GLOW_COLORS[(index + handIndex) % GLOW_COLORS.length];

          ctx.save();
          ctx.shadowColor = glowColor;
          ctx.shadowBlur = isTip ? 28 : 18;
          ctx.globalCompositeOperation = 'lighter';

          const radius = isTip ? 6 : 3.3;
          const radial = ctx.createRadialGradient(screen.x, screen.y, 0, screen.x, screen.y, radius * 3.5);
          radial.addColorStop(0, 'rgba(255,255,255,0.98)');
          radial.addColorStop(0.35, glowColor);
          radial.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = radial;
          ctx.beginPath();
          ctx.arc(screen.x, screen.y, radius * 3.5, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.fillStyle = glowColor;
          ctx.beginPath();
          ctx.arc(screen.x, screen.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      });
    }

    function drawStrings(p) {
      const ctx = p.drawingContext;
      const time = p.millis() * 0.001;

      state.strings.forEach((string, index) => {
        const pulse = 0.5 + 0.5 * Math.sin(time * 2.2 + index * 1.1);
        const spread = Math.max(1, Math.min(1.3, string.chord / 180));
        const midX = (string.a.x + string.b.x) * 0.5;
        const midY = (string.a.y + string.b.y) * 0.5;
        const normalX = -(string.b.y - string.a.y);
        const normalY = string.b.x - string.a.x;
        const normLength = Math.hypot(normalX, normalY) || 1;
        const bend = (24 + 70 * string.tension) * (0.3 + pulse * 0.7);
        const controlX = midX + (normalX / normLength) * bend * 0.08 + Math.sin(time * 3.2 + index) * string.wobble * 0.15;
        const controlY = midY + (normalY / normLength) * bend * 0.08 + Math.cos(time * 2.4 + index * 0.7) * string.wobble * 0.15;

        const colorStops = [
          { stop: 0, color: 'rgba(88,247,255,0.92)' },
          { stop: 0.5, color: 'rgba(255,79,216,0.94)' },
          { stop: 1, color: 'rgba(255,225,92,0.92)' }
        ];

        const gradient = ctx.createLinearGradient(string.a.x, string.a.y, string.b.x, string.b.y);
        colorStops.forEach(({ stop, color }) => gradient.addColorStop(stop, color));

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 18 + 26 * string.tension;
        ctx.shadowColor = string.tension > 0.5 ? 'rgba(88,247,255,0.8)' : 'rgba(255,79,216,0.7)';

        ctx.strokeStyle = gradient;
        ctx.lineWidth = 1.2 + (string.tension * 4.8) + pulse * 0.8;
        ctx.beginPath();
        ctx.moveTo(string.a.x, string.a.y);
        ctx.quadraticCurveTo(controlX, controlY, string.b.x, string.b.y);
        ctx.stroke();

        ctx.shadowBlur = 36;
        ctx.globalAlpha = 0.22;
        ctx.lineWidth = ctx.lineWidth * 2.4;
        ctx.beginPath();
        ctx.moveTo(string.a.x, string.a.y);
        ctx.quadraticCurveTo(controlX, controlY, string.b.x, string.b.y);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.88;
        ctx.lineWidth = 0.6;
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.moveTo(string.a.x, string.a.y);
        ctx.quadraticCurveTo(controlX, controlY, string.b.x, string.b.y);
        ctx.stroke();

        ctx.restore();
      });
    }

    function updateParticles(p) {
      const ctx = p.drawingContext;
      state.particles = state.particles.filter((particle) => particle.life > 0);
      state.particles.forEach((particle) => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vx *= 0.985;
        particle.vy *= 0.985;
        particle.vy += 0.01;
        particle.life -= particle.decay;

        const alpha = Math.max(0, particle.life);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowBlur = 16;
        ctx.shadowColor = particle.color;
        ctx.fillStyle = particle.color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size * (0.8 + alpha), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: 'user',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        videoEl.srcObject = stream;
        await videoEl.play();
        state.videoReady = true;
        updateStatus('Camera active. Looking for both hands.');
      } catch (error) {
        state.cameraError = error && error.message ? error.message : 'Unable to access camera.';
        updateStatus(`Camera unavailable: ${state.cameraError}`);
      }
    }

    function configureHands() {
      const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.55,
        minTrackingConfidence: 0.55
      });

      hands.onResults((results) => {
        const nextHands = mixHands(results);
        state.hasHands = !!(nextHands.left || nextHands.right);
        smoothHands(nextHands);
        updateStrings();
        maybeTriggerContacts();
        if (state.hasHands) {
          updateStatus('Hands tracked. Stretch and weave the strings.');
        } else if (!state.cameraError) {
          updateStatus('Camera active. Place both hands in frame.');
        }
      });

      const camera = new Camera(videoEl, {
        onFrame: async () => {
          if (videoEl.readyState >= 2) {
            await hands.send({ image: videoEl });
          }
        },
        width: 1280,
        height: 720
      });

      camera.start();
    }

    new p5((p) => {
      p.setup = () => {
        const canvas = p.createCanvas(window.innerWidth, window.innerHeight);
        canvas.parent('overlay');
        p.pixelDensity(Math.min(window.devicePixelRatio || 1, 2));
        p.noFill();
        p.strokeCap(p.ROUND);
        p.strokeJoin(p.ROUND);
        state.width = p.width;
        state.height = p.height;

        startCamera().then(() => {
          if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            configureHands();
          }
        });
      };

      p.windowResized = () => {
        p.resizeCanvas(window.innerWidth, window.innerHeight);
        state.width = p.width;
        state.height = p.height;
      };

      p.draw = () => {
        drawBackground(p);
        drawVideo(p);
        drawStrings(p);
        drawJoints(p);
        updateParticles(p);
      };
    });
  </script>
</body>
</html>
